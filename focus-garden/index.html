<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Capsule Notes</title>
    <meta name="description" content="Write notes that unlock in the future." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>Time Capsule Notes</h1>
        <p>Seal a message for later and open it only when its time arrives.</p>
      </header>

      <main class="app-main">
        <section class="card" aria-labelledby="form-heading">
          <h2 id="form-heading">Create capsule</h2>
          <form id="capsule-form" novalidate>
            <div class="form-group">
              <label for="capsule-title">Title</label>
              <input type="text" id="capsule-title" autocomplete="off" />
            </div>

            <div class="form-group">
              <label for="capsule-content">Message</label>
              <textarea id="capsule-content" rows="5"></textarea>
            </div>

            <div class="form-group">
              <label for="capsule-unlock">Unlock at</label>
              <input type="datetime-local" id="capsule-unlock" />
            </div>

            <p id="capsule-error" class="form-error" aria-live="polite"></p>
            <button id="seal-btn" class="primary-btn" type="submit" disabled>Seal capsule</button>
          </form>
        </section>

        <section class="capsules-section" aria-labelledby="capsules-heading">
          <div class="section-header">
            <h2 id="capsules-heading">Capsules</h2>
          </div>

          <div id="capsule-list" class="capsule-list"></div>
          <div id="capsule-empty-state" class="empty-state">
            <p>No time capsules yet.</p>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
